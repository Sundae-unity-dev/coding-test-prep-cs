<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관리자 - Elice Coding Camp</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="assets/app.css">
<script>(function(){try{var t=localStorage.getItem('ctprep_theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif; }
  .wrap { max-width:1040px; margin:0 auto; padding:28px 18px 80px; }
  h1 { font-size:23px; margin:6px 0 2px; }
  .sub { color:var(--ink-soft); font-size:13.5px; margin-bottom:22px; }
  .gate { max-width:360px; margin:60px auto; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:26px 24px; box-shadow:0 12px 40px var(--shadow); }
  .gate h2 { font-size:18px; margin:0 0 14px; }
  .gate input { width:100%; box-sizing:border-box; padding:11px 13px; font-size:15px; border:1px solid var(--line); border-radius:10px; background:var(--bg); color:var(--ink); margin-bottom:12px; }
  .gate button, .bar button { padding:10px 16px; font-size:14px; font-weight:800; color:#fff; background:var(--purple); border:none; border-radius:10px; cursor:pointer; }
  .gate button { width:100%; }
  .err { color:#E5484D; font-size:13px; min-height:18px; margin-bottom:6px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 6px 18px var(--shadow); }
  .stat .n { font-size:26px; font-weight:800; color:var(--purple-dark); }
  .stat .l { font-size:12.5px; color:var(--ink-soft); margin-top:3px; }
  .bar { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .bar .grow { flex:1; }
  .bar .ghost { background:transparent; color:var(--purple-dark); border:1px solid var(--line); }
  .bar input { padding:9px 13px; font-size:13.5px; border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink); min-width:200px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  th, td { padding:11px 13px; text-align:left; font-size:13.5px; border-bottom:1px solid var(--line); }
  th { background:var(--purple-bg); color:var(--purple-dark); font-size:12.5px; font-weight:800; }
  tr.row { cursor:pointer; }
  tr.row:hover td { background:rgba(136,67,255,0.06); }
  td.num { text-align:right; font-variant-numeric:tabular-nums; }
  .detail td { background:var(--bg); }
  .dwrap { display:grid; gap:14px; padding:6px 2px; }
  .dsec h4 { margin:0 0 6px; font-size:13.5px; color:var(--purple-dark); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { background:var(--purple-bg); color:var(--purple-dark); border-radius:999px; padding:3px 11px; font-size:12px; font-weight:700; }
  .codecard { border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:10px; }
  .codecard .ch { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--purple-bg); font-size:12.5px; font-weight:700; }
  .codecard .ch .pass { color:#1F9D55; } .codecard .ch .fail { color:#E5484D; }
  .codecard pre { margin:0; padding:12px; overflow-x:auto; font-size:12.5px; line-height:1.5; background:#1B1B28; color:#E7E7F1; font-family:'Cascadia Code','Consolas',monospace; }
  .muted { color:var(--ink-soft); font-size:12.5px; }
  .tl { font-size:12.5px; line-height:1.7; }
  .tl b { color:var(--purple-dark); }
</style>
</head>
<body>
<div class="wrap">
  <div id="gate" class="gate">
    <h2>관리자 로그인</h2>
    <div id="gateErr" class="err"></div>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="off">
    <button id="loginBtn" type="button">들어가기</button>
  </div>

  <div id="dash" style="display:none;">
    <h1>학습 진행 현황</h1>
    <div class="sub">멤버(이름)별로 묶어서 보여드려요. 행을 누르면 그 멤버의 푼 문제 / 개념 / 작성 코드 / 활동을 한 번에 볼 수 있어요.</div>
    <div id="cards" class="cards"></div>
    <div class="bar">
      <input id="search" type="text" placeholder="멤버 이름 검색..." autocomplete="off">
      <div class="grow"></div>
      <button id="refreshBtn" type="button" class="ghost">새로고침</button>
    </div>
    <table>
      <thead><tr>
        <th>멤버</th><th>최근 접속</th><th class="num">방문</th><th class="num">학습시간</th>
        <th class="num">푼 문제</th><th class="num">개념</th><th>마지막 위치</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="muted" style="margin-top:14px;display:none;">아직 기록이 없어요. 누군가 사이트에 들어와 활동하면 여기에 나타납니다.</div>
  </div>
</div>

<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
<script>
(function () {
  var DATA = null, PW = '';

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
  function num(v) { var n = Number(v); return isNaN(n) ? 0 : n; }
  function fmtSec(s) { s = num(s); if (s < 60) return s + '초'; var m = Math.floor(s / 60); if (m < 60) return m + '분'; var h = Math.floor(m / 60); return h + '시간 ' + (m % 60) + '분'; }
  function fmtTime(iso) {
    if (!iso) return '-';
    var d = new Date(iso); if (isNaN(d)) return '-';
    var now = new Date(), diff = (now - d) / 1000;
    if (diff < 60) return '방금';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    if (diff < 86400 * 7) return Math.floor(diff / 86400) + '일 전';
    return (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }
  function csvCount(s) { return String(s || '').split(',').filter(String).length; }

  function showErr(m) { var e = document.getElementById('gateErr'); e.textContent = m || ''; }

  function load(pw) {
    PW = pw;
    var old = document.getElementById('jsonp'); if (old) old.remove();
    var s = document.createElement('script');
    s.id = 'jsonp';
    var url = window.CT_ENDPOINT;
    if (!url) { showErr('assets/config.js 에 서버 주소(CT_ENDPOINT)가 아직 비어 있어요.'); return; }
    s.src = url + (url.indexOf('?') < 0 ? '?' : '&') + 'token=' + encodeURIComponent(pw) + '&callback=ctAdminData&_=' + Date.now();
    s.onerror = function () { showErr('서버에 연결하지 못했어요. 주소를 확인해 주세요.'); };
    document.body.appendChild(s);
  }

  window.ctAdminData = function (d) {
    if (!d || d.error) { showErr('비밀번호가 맞지 않아요.'); return; }
    DATA = d;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    render();
  };

  var MEMBERS = [];
  function keys(o) { return Object.keys(o); }

  // 같은 이름은 한 멤버로 합쳐요(여러 번 방문하거나 다른 기기로 와도 한 사람으로).
  function buildMembers() {
    var map = {};
    (DATA.progress || []).forEach(function (p) {
      var key = (p.name || '').trim() || '(이름없음)';
      var m = map[key] || (map[key] = { name: key, vids: {}, visits: 0, totalSec: 0, solved: {}, concepts: {}, firstSeen: null, lastSeen: null, lastPage: '', lastPageAt: null });
      m.vids[String(p.vid)] = 1;
      m.visits += num(p.visits);
      m.totalSec += num(p.totalSec);
      String(p.solvedIds || '').split(',').filter(String).forEach(function (x) { m.solved[x] = 1; });
      String(p.concepts || '').split(',').filter(String).forEach(function (x) { m.concepts[x] = 1; });
      var fs = p.firstSeen ? new Date(p.firstSeen) : null, ls = p.lastSeen ? new Date(p.lastSeen) : null;
      if (fs && (!m.firstSeen || fs < m.firstSeen)) m.firstSeen = fs;
      if (ls && (!m.lastSeen || ls > m.lastSeen)) m.lastSeen = ls;
      if (ls && p.lastPage && (!m.lastPageAt || ls > m.lastPageAt)) { m.lastPage = p.lastPage; m.lastPageAt = ls; }
    });
    MEMBERS = keys(map).map(function (k) { return map[k]; }).sort(function (a, b) { return (b.lastSeen || 0) - (a.lastSeen || 0); });
  }

  function render() {
    buildMembers();
    var totalSolved = 0, totalSec = 0;
    MEMBERS.forEach(function (m) { totalSolved += keys(m.solved).length; totalSec += m.totalSec; });
    document.getElementById('cards').innerHTML =
      stat(MEMBERS.length, '멤버') + stat(totalSolved, '푼 문제(누적)') + stat(fmtSec(totalSec), '총 학습시간') + stat((DATA.code || []).length, '코드 제출');
    renderRows((document.getElementById('search').value || ''));
  }

  function renderRows(filter) {
    var rows = document.getElementById('rows');
    rows.innerHTML = '';
    var f = (filter || '').toLowerCase().trim();
    var list = MEMBERS.filter(function (m) { return !f || m.name.toLowerCase().indexOf(f) >= 0; });
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';
    list.forEach(function (m) {
      var tr = document.createElement('tr');
      tr.className = 'row';
      tr.innerHTML = '<td><b>' + esc(m.name) + '</b></td>' +
        '<td>' + esc(fmtTime(m.lastSeen ? m.lastSeen.toISOString() : '')) + '</td>' +
        '<td class="num">' + m.visits + '</td>' +
        '<td class="num">' + esc(fmtSec(m.totalSec)) + '</td>' +
        '<td class="num">' + keys(m.solved).length + '</td>' +
        '<td class="num">' + keys(m.concepts).length + '</td>' +
        '<td>' + esc(m.lastPage || '-') + '</td>';
      var dtr = document.createElement('tr');
      dtr.className = 'detail'; dtr.style.display = 'none';
      var dtd = document.createElement('td'); dtd.colSpan = 7;
      dtr.appendChild(dtd);
      tr.addEventListener('click', function () {
        var open = dtr.style.display !== 'none';
        dtr.style.display = open ? 'none' : '';
        if (!open && !dtd.dataset.built) { dtd.innerHTML = detailHtml(m); dtd.dataset.built = '1'; }
      });
      rows.appendChild(tr); rows.appendChild(dtr);
    });
  }

  function stat(n, l) { return '<div class="stat"><div class="n">' + esc(n) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  function detailHtml(m) {
    var codes = (DATA.code || []).filter(function (c) { return m.vids[String(c.vid)]; })
      .sort(function (a, b) { return new Date(b.updated || 0) - new Date(a.updated || 0); });
    var evs = (DATA.events || []).filter(function (e) { return m.vids[String(e.vid)]; })
      .sort(function (a, b) { return new Date(b.time || 0) - new Date(a.time || 0); }).slice(0, 30);
    var sv = keys(m.solved), cs = keys(m.concepts);

    var h = '<div class="dwrap">';
    h += '<div class="dsec"><h4>요약</h4><div class="muted">처음 방문 ' + esc(fmtTime(m.firstSeen ? m.firstSeen.toISOString() : '')) + ' / 누적 방문 ' + m.visits + '회 / 학습시간 ' + esc(fmtSec(m.totalSec)) + ' / 접속 기기 ' + keys(m.vids).length + '대</div></div>';
    h += '<div class="dsec"><h4>푼 문제 (' + sv.length + ')</h4>' + (sv.length ? '<div class="chips">' + sv.map(function (x) { return '<span class="chip">' + esc(x) + '</span>'; }).join('') : '<span class="muted">아직 없음</span>') + '</div>';
    h += '<div class="dsec"><h4>열람한 개념 (' + cs.length + ')</h4>' + (cs.length ? '<div class="chips">' + cs.map(function (x) { return '<span class="chip">' + esc(x) + '</span>'; }).join('') : '<span class="muted">아직 없음</span>') + '</div>';
    h += '<div class="dsec"><h4>작성 코드 (' + codes.length + ')</h4>';
    if (!codes.length) h += '<span class="muted">아직 없음</span>';
    else codes.forEach(function (c) {
      h += '<div class="codecard"><div class="ch"><span>' + esc(c.title || c.pid) + '</span><span class="' + (c.passed === '통과' ? 'pass' : 'fail') + '">' + esc(c.passed) + ' / ' + esc(fmtTime(c.updated)) + '</span></div><pre>' + esc(c.code) + '</pre></div>';
    });
    h += '</div>';
    if (evs.length) {
      h += '<div class="dsec"><h4>활동 기록</h4><div class="tl">';
      evs.forEach(function (e) {
        var label = e.type === 'solved' ? '풀이' : (e.type === 'concept' ? '개념' : (e.type === 'join' ? '입장' : e.type));
        h += '<div><b>' + esc(label) + '</b> ' + esc(e.info || '') + ' <span class="muted">(' + esc(fmtTime(e.time)) + ')</span></div>';
      });
      h += '</div></div>';
    }
    h += '</div>';
    return h;
  }

  document.getElementById('loginBtn').addEventListener('click', function () { load(document.getElementById('pw').value.trim()); });
  document.getElementById('pw').addEventListener('keydown', function (e) { if (e.key === 'Enter') load(this.value.trim()); });
  document.getElementById('refreshBtn').addEventListener('click', function () { load(PW); });
  document.getElementById('search').addEventListener('input', function () { renderRows(this.value); });
})();
</script>
</body>
</html>
