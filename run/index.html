<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.66stpp682q.js"></script>
    <script>
      // 코드 입력칸을 코드 에디터처럼: Tab=4칸 들여쓰기, Enter=이전 줄 들여쓰기 따라가기.
      // (Blazor 가 textarea 를 다시 그려도 document 위임 리스너라 항상 동작)
      document.addEventListener('keydown', function (e) {
        var ta = e.target;
        if (!(ta instanceof HTMLTextAreaElement) || !ta.classList.contains('code')) return;

        if (e.key === 'Tab') {
          e.preventDefault();
          ta.setRangeText('    ', ta.selectionStart, ta.selectionEnd, 'end');
          ta.dispatchEvent(new Event('input', { bubbles: true }));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          var s = ta.selectionStart;
          var lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
          var m = ta.value.slice(lineStart, s).match(/^[ \t]*/);
          var indent = m ? m[0] : '';
          ta.setRangeText('\n' + indent, ta.selectionStart, ta.selectionEnd, 'end');
          ta.dispatchEvent(new Event('input', { bubbles: true }));
        }
      });
    </script>
</body>

</html>
