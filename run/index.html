    <!-- Monaco 코드 에디터 (CDN). C# 문법 강조 + 자동완성 + 줄번호 + 오류 밑줄 -->
    <script>
      var MONACO_BASE = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/';
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
            "self.MonacoEnvironment={baseUrl:'" + MONACO_BASE + "'};" +
            "importScripts('" + MONACO_BASE + "vs/base/worker/workerMain.js');");
        }
      };

      window.ctEditor = {
        _ed: null,
        _loaded: false,
        _loadMonaco: function () {
          return new Promise(function (resolve, reject) {
            if (window.monaco) { resolve(); return; }
            var s = document.createElement('script');
            s.src = MONACO_BASE + 'vs/loader.js';
            s.onload = function () {
              require.config({ paths: { vs: MONACO_BASE + 'vs' } });
              require(['vs/editor/editor.main'], function () { resolve(); });
            };
            s.onerror = function () { reject('monaco loader 실패'); };
            document.head.appendChild(s);
          });
        },
        _registerCsharp: function () {
          if (window.ctEditor._loaded) return;
          window.ctEditor._loaded = true;
          var kw = ['using','namespace','class','struct','static','void','int','long','double','float','bool','char','string','var','new','return','if','else','for','foreach','while','do','in','out','ref','public','private','protected','internal','const','readonly','true','false','null','break','continue','switch','case','default','this','base','try','catch','finally','throw','yield','params','unsafe','fixed'];
          var members = ['Console','WriteLine','ReadLine','Write','Parse','TryParse','Convert','ToInt32','Math','Min','Max','Abs','Sqrt','Pow','Array','Sort','Reverse','ConvertAll','Fill','Copy','List','Dictionary','HashSet','Queue','Stack','PriorityQueue','SortedSet','StringBuilder','Append','AppendLine','ToString','Length','Count','Add','Contains','ContainsKey','TryGetValue','Enqueue','Dequeue','Peek','Push','Pop','Split','Join','Substring','Select','Where','OrderBy','OrderByDescending','ThenBy','Sum','Average','First','Last','Take','Skip','ToArray','ToList'];
          monaco.languages.registerCompletionItemProvider('csharp', {
            provideCompletionItems: function (model, position) {
              var word = model.getWordUntilPosition(position);
              var range = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: word.endColumn };
              var sug = [];
              kw.forEach(function (k) { sug.push({ label: k, kind: monaco.languages.CompletionItemKind.Keyword, insertText: k, range: range }); });
              members.forEach(function (m) { sug.push({ label: m, kind: monaco.languages.CompletionItemKind.Method, insertText: m, range: range }); });
              var snip = monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet;
              sug.push({ label: 'cw', detail: 'Console.WriteLine', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'Console.WriteLine(${1});', insertTextRules: snip, range: range });
              sug.push({ label: 'cr', detail: 'Console.ReadLine', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'Console.ReadLine()', insertTextRules: snip, range: range });
              sug.push({ label: 'readints', detail: '공백 구분 정수 배열 읽기', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'int[] ${1:arr} = Array.ConvertAll(Console.ReadLine().Split(), int.Parse);', insertTextRules: snip, range: range });
              sug.push({ label: 'forn', detail: 'for 반복문', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'for (int ${1:i} = 0; ${1:i} < ${2:n}; ${1:i}++)\n{\n    $0\n}', insertTextRules: snip, range: range });
              sug.push({ label: 'foreachv', detail: 'foreach 반복문', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'foreach (var ${1:item} in ${2:items})\n{\n    $0\n}', insertTextRules: snip, range: range });
              sug.push({ label: 'main', detail: 'Main 메서드 골격', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'using System;\n\nclass Program\n{\n    static void Main()\n    {\n        $0\n    }\n}', insertTextRules: snip, range: range });
              return { suggestions: sug };
            }
          });
        },
        init: function (elementId, value, saveId) {
          return window.ctEditor._loadMonaco().then(function () {
            window.ctEditor._registerCsharp();
            var el = document.getElementById(elementId);
            if (!el) return;
            if (window.ctEditor._ed) { window.ctEditor._ed.dispose(); window.ctEditor._ed = null; }
            var initTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'vs-dark' : 'vs';
            var initFont = parseInt(localStorage.getItem('ctrun_font') || '16', 10) || 16;
            var initFam = (localStorage.getItem('ctrun_fontfamily') || '').trim();
            window.ctEditor._ed = monaco.editor.create(el, {
              value: value || '',
              language: 'csharp',
              theme: initTheme,
              automaticLayout: true,
              minimap: { enabled: false },
              fontSize: initFont,
              tabSize: 4,
              insertSpaces: true,
              scrollBeyondLastLine: false,
              lineNumbers: 'on',
              renderLineHighlight: 'line',
              fontFamily: (initFam ? initFam + ', ' : '') + "'Cascadia Code','Consolas',monospace"
            });
            // 단축키: Ctrl+Enter 채점, Ctrl+' 오류 체크 (버튼 DOM 클릭으로 Blazor 핸들러 호출)
            var ed = window.ctEditor._ed;
            ed.addAction({ id: 'ct-judge', label: '채점하기', keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter], run: function () { var b = document.querySelector('.run.judge'); if (b && !b.disabled) b.click(); } });
            ed.addAction({ id: 'ct-check', label: '오류 체크하기', keybindings: [monaco.KeyMod.CtrlCmd | monaco.KeyCode.Quote], run: function () { var b = document.querySelector('.run.check'); if (b && !b.disabled) b.click(); } });
            // 문제별 코드 자동저장(디바운스). saveId(문제 id)가 있을 때만.
            window.ctEditor._saveId = saveId || null;
            if (saveId) {
              var _t = null;
              ed.getModel().onDidChangeContent(function () {
                clearTimeout(_t);
                _t = setTimeout(function () {
                  try { var m = JSON.parse(localStorage.getItem('ct_code_v1') || '{}'); m[saveId] = ed.getValue(); localStorage.setItem('ct_code_v1', JSON.stringify(m)); } catch (e) {}
                }, 600);
              });
            }
          }).catch(function (e) { console.error('ctEditor init', e); });
        },
        getValue: function () { return window.ctEditor._ed ? window.ctEditor._ed.getValue() : null; },
        copy: function () { try { navigator.clipboard.writeText((window.ctEditor._ed ? window.ctEditor._ed.getValue() : '') || ''); return true; } catch (e) { return false; } },
        setValue: function (v) { if (window.ctEditor._ed) window.ctEditor._ed.setValue(v || ''); },
        setMarkers: function (diags) {
          if (!window.ctEditor._ed || !window.monaco) return;
          var model = window.ctEditor._ed.getModel();
          var markers = (diags || []).map(function (d) {
            return {
              startLineNumber: d.line, startColumn: d.col,
              endLineNumber: d.line, endColumn: d.col + 1,
              message: '[' + d.id + '] ' + d.message,
              severity: d.severity === 'error' ? monaco.MarkerSeverity.Error : monaco.MarkerSeverity.Warning
            };
          });
          monaco.editor.setModelMarkers(model, 'csharp', markers);
        },
        clearMarkers: function () {
          if (window.ctEditor._ed && window.monaco)
            monaco.editor.setModelMarkers(window.ctEditor._ed.getModel(), 'csharp', []);
        },
        revealLine: function (line) { if (window.ctEditor._ed) { window.ctEditor._ed.revealLineInCenter(line); window.ctEditor._ed.setPosition({ lineNumber: line, column: 1 }); window.ctEditor._ed.focus(); } },
        setTheme: function (t) { if (window.monaco) monaco.editor.setTheme(t); },
        setFontSize: function (delta) {
          if (!window.ctEditor._ed || !window.monaco) return;
          var cur = window.ctEditor._ed.getOption(monaco.editor.EditorOption.fontSize);
          var n = Math.max(11, Math.min(24, Math.round(cur) + delta));
          window.ctEditor._ed.updateOptions({ fontSize: n });
          try { localStorage.setItem('ctrun_font', n); } catch (e) {}
        },
        setFontFamily: function (f) {
          f = (f || '').trim();
          if (window.ctEditor._ed) window.ctEditor._ed.updateOptions({ fontFamily: (f ? f + ', ' : '') + "'Cascadia Code','Consolas',monospace" });
          try { localStorage.setItem('ctrun_fontfamily', f); } catch (e) {}
        },
        buildFontPicker: function (slotId) {
          var slot = document.getElementById(slotId); if (!slot || slot.dataset.built) return; slot.dataset.built = '1';
          var saved = (localStorage.getItem('ctrun_fontfamily') || '').trim();
          var presets = ['기본', 'D2Coding', 'Consolas', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Nanum Gothic Coding'];
          var sel = document.createElement('select'); sel.className = 'fontsel'; sel.title = '에디터 글꼴';
          presets.forEach(function (p) { var o = document.createElement('option'); o.value = (p === '기본' ? '' : p); o.textContent = p; sel.appendChild(o); });
          var co = document.createElement('option'); co.value = '__c'; co.textContent = '직접 입력...'; sel.appendChild(co);
          var inp = document.createElement('input'); inp.className = 'fontcustom'; inp.placeholder = '글꼴 이름'; inp.style.display = 'none';
          if (saved) { if (presets.indexOf(saved) >= 0) sel.value = saved; else { sel.value = '__c'; inp.style.display = ''; inp.value = saved; } }
          sel.addEventListener('change', function () { if (sel.value === '__c') { inp.style.display = ''; inp.focus(); } else { inp.style.display = 'none'; window.ctEditor.setFontFamily(sel.value); } });
          inp.addEventListener('change', function () { window.ctEditor.setFontFamily(inp.value); });
          inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') window.ctEditor.setFontFamily(inp.value); });
          slot.appendChild(sel); slot.appendChild(inp);
        },
        _diff: null,
        showDiff: function (mine, solution) {
          var host = document.getElementById('diffHost'); if (!host || !window.monaco) return;
          host.style.display = 'block';
          if (window.ctEditor._diff) { window.ctEditor._diff.dispose(); window.ctEditor._diff = null; }
          var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'vs-dark' : 'vs';
          var de = monaco.editor.createDiffEditor(host, { theme: theme, readOnly: true, automaticLayout: true, minimap: { enabled: false }, fontSize: 13, renderSideBySide: true });
          de.setModel({ original: monaco.editor.createModel(mine || '', 'csharp'), modified: monaco.editor.createModel(solution || '', 'csharp') });
          window.ctEditor._diff = de;
        },
        closeDiff: function () {
          if (window.ctEditor._diff) { window.ctEditor._diff.dispose(); window.ctEditor._diff = null; }
          var host = document.getElementById('diffHost'); if (host) { host.style.display = 'none'; host.innerHTML = ''; }
        },
        buildTimer: function (slotId, minutes) {
          var slot = document.getElementById(slotId); if (!slot || slot.dataset.built) return; slot.dataset.built = '1';
          var total = (parseInt(minutes, 10) || 30) * 60, left = total, iv = null, running = false;
          slot.innerHTML = '<span class="tm-time"></span><button type="button" class="tm-btn tm-start">시작</button><button type="button" class="tm-btn tm-reset">리셋</button>';
          var disp = slot.querySelector('.tm-time'), startBtn = slot.querySelector('.tm-start'), resetBtn = slot.querySelector('.tm-reset');
          function fmt(s) { var m = Math.floor(s / 60), ss = s % 60; return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss; }
          function render() { disp.textContent = left <= 0 ? '시간 종료' : fmt(left); slot.classList.toggle('tm-over', left <= 0); }
          function stop() { running = false; startBtn.textContent = '시작'; if (iv) { clearInterval(iv); iv = null; } }
          function tick() { if (left > 0) { left--; render(); if (left <= 0) stop(); } }
          startBtn.addEventListener('click', function () { if (running) { stop(); } else { if (left <= 0) { left = total; } running = true; startBtn.textContent = '정지'; iv = setInterval(tick, 1000); } });
          resetBtn.addEventListener('click', function () { stop(); left = total; slot.classList.remove('tm-over'); render(); });
          render();
        }
      };
    </script>
