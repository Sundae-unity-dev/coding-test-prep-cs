<head>

<script>(function(){try{var t=localStorage.getItem('ctprep_theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif; }
  nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:18px; padding:12px 22px; background:var(--nav-bg); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  nav a { color:var(--ink-soft); text-decoration:none; font-size:14px; font-weight:600; }
  nav a:hover { color:var(--purple-dark); }
  nav a.on { color:var(--purple-dark); }
  .sitebrand { display:flex; align-items:center; gap:8px; font-weight:800; color:var(--ink); font-size:15px; }
  .wrap { max-width:720px; margin:0 auto; padding:24px 18px 90px; }

  .phead { text-align:center; margin-bottom:18px; }
  .phead h1 { font-size:26px; margin:0 0 6px; }
  .phead p { font-size:14.5px; color:var(--ink-soft); margin:0 0 14px; }
  .poverall { display:inline-flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:8px 16px; box-shadow:0 4px 12px var(--shadow); font-size:13.5px; font-weight:700; }
  .poverall .pbar { width:140px; height:9px; background:var(--purple-bg); border-radius:999px; overflow:hidden; }
  .poverall .pbar i { display:block; height:100%; background:linear-gradient(90deg,var(--purple),var(--purple-dark)); border-radius:999px; }
  .poverall b { color:var(--purple-dark); }

  .pt-head { display:flex; align-items:center; gap:10px; justify-content:center; margin:26px 0 6px; }
  .pt-name { font-size:16px; font-weight:800; padding:4px 14px; border-radius:999px; background:var(--purple-bg); color:var(--purple-dark); }
  .pt-prog { font-size:12.5px; color:var(--ink-soft); font-weight:700; }

  .ptrack { position:relative; padding:10px 0; }
  .ptrack::before { content:''; position:absolute; left:50%; top:18px; bottom:18px; width:3px; background:var(--line); transform:translateX(-50%); border-radius:2px; }
  .pnode { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:max-content; margin:0 auto; }
  .pnode + .pnode { margin-top:14px; }
  .pcircle { width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; text-decoration:none; border:3px solid var(--line); background:var(--card); color:var(--ink-soft); box-shadow:0 4px 10px var(--shadow); transition:transform .15s ease; }
  .pcircle:hover { transform:scale(1.07); }
  .pnode.done .pcircle { background:linear-gradient(135deg,#16A34A,#22C55E); border-color:#16A34A; color:#fff; }
  .pnode.current .pcircle { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); border-color:var(--purple); color:#fff; animation:pPulse 1.5s ease-in-out infinite; }
  .plabel { font-size:12px; color:var(--ink-soft); margin-top:5px; max-width:150px; text-align:center; line-height:1.3; }
  .pnode.current .plabel { color:var(--purple-dark); font-weight:800; }
  .pnow { font-size:11px; font-weight:800; color:#fff; background:var(--purple); border-radius:999px; padding:2px 10px; margin-top:5px; }
  @keyframes pPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(136,67,255,.5); } 50%{ box-shadow:0 0 0 9px rgba(136,67,255,0); } }
  @media (prefers-reduced-motion: reduce){ .pnode.current .pcircle{ animation:none; } }

  /* 개념 레슨 노드: 문제(회색 원)와 구분되게 보라 톤 + 📖 */
  .pnode.lesson .pcircle { font-size:22px; }
  .pnode.lesson.todo .pcircle { background:var(--purple-bg); border-color:var(--purple); color:var(--purple-dark); }
  .pnode.lesson .plabel { color:var(--purple-dark); font-weight:700; }
  .pquiz { font-size:10.5px; font-weight:800; color:var(--purple-dark); background:var(--purple-bg); border:1px solid var(--line); border-radius:999px; padding:1px 9px; margin-top:4px; }
  .pnode.lesson.done .pquiz { color:var(--green,#16A34A); }

  /* 범례 */
  .plegend { display:inline-flex; flex-wrap:wrap; justify-content:center; gap:7px 14px; margin-top:12px; font-size:12.5px; color:var(--ink-soft); }
  .plegend span { display:inline-flex; align-items:center; gap:5px; }
  .plegend .dot { width:15px; height:15px; border-radius:50%; display:inline-block; }
  .plegend .d-lesson { background:var(--purple-bg); border:2px solid var(--purple); }
  .plegend .d-done { background:linear-gradient(135deg,#16A34A,#22C55E); }
  .plegend .d-cur { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); }

  footer { text-align:center; color:var(--ink-soft); font-size:12.5px; padding:24px 18px 40px; }

  /* 개념 미니퀴즈 모달 */
  .qz-ov { position:fixed; inset:0; background:rgba(20,16,40,.55); display:none; align-items:center; justify-content:center; z-index:500; padding:18px; }
  .qz-ov.on { display:flex; }
  .qz { background:var(--card); border:1px solid var(--line); border-radius:18px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,.3); padding:24px 26px 26px; }
  .qz-h { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .qz-h h2 { font-size:19px; margin:0; }
  .qz-close { background:none; border:none; font-size:24px; line-height:1; cursor:pointer; color:var(--ink-soft); padding:0 2px; }
  .qz-close:hover { color:var(--purple-dark); }
  .qz-sub { font-size:13px; color:var(--ink-soft); margin:4px 0 14px; }
  .qz-sub a { color:var(--purple-dark); font-weight:700; text-decoration:none; }
  .qz-sub a:hover { text-decoration:underline; }
  .qz-prog { height:7px; background:var(--purple-bg); border-radius:999px; overflow:hidden; margin-bottom:18px; }
  .qz-prog i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--purple),var(--purple-dark)); border-radius:999px; transition:width .4s ease; }
  .qz-q { margin-bottom:18px; }
  .qz-q .qq { font-weight:700; font-size:14.5px; margin-bottom:10px; line-height:1.5; }
  .qz-q .qq .qn { color:var(--purple-dark); margin-right:7px; }
  .qz-opts { display:flex; flex-direction:column; gap:8px; }
  .qz-opts button { text-align:left; font-family:inherit; font-size:14px; padding:11px 14px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:10px; cursor:pointer; transition:border-color .12s, background .12s; }
  .qz-opts button:hover:not(:disabled) { border-color:var(--purple); background:var(--purple-bg); }
  .qz-opts button:disabled { cursor:default; }
  .qz-opts button.correct { border-color:#16A34A; background:var(--green-bg,#E7F8EE); color:var(--ink); font-weight:700; }
  .qz-opts button.wrong { border-color:#E0526A; background:var(--red-bg,#FBECEE); }
  .qz-ex { font-size:13px; color:var(--ink-soft); line-height:1.55; margin-top:9px; padding:10px 13px; background:var(--purple-bg); border-radius:9px; display:none; }
  .qz-ex.show { display:block; }
  .qz-ex b { color:var(--purple-dark); }
  .qz-done { margin-top:6px; padding:14px; text-align:center; background:var(--purple-bg); border-radius:12px; }
  .qz-done .big { font-size:17px; font-weight:800; color:var(--purple-dark); }
  .qz-done .sm { font-size:13px; color:var(--ink-soft); margin-top:4px; }
  @media (prefers-reduced-motion: reduce){ .qz-prog i { transition:none; } }
</style>
</head>

    <p>개념을 한 입씩 배우고 바로 문제로 이어 풀며, 입문부터 심화까지 길을 따라 정복해요.</p>
