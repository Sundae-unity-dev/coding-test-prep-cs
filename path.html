<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="description" content="학습 경로: 단계별로 문제를 하나씩 정복하는 스킬트리.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8843FF">

<script>(function(){try{var t=localStorage.getItem('ctprep_theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif; }
  nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:18px; padding:12px 22px; background:var(--nav-bg); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  nav a { color:var(--ink-soft); text-decoration:none; font-size:14px; font-weight:600; }
  nav a:hover { color:var(--purple-dark); }
  nav a.on { color:var(--purple-dark); }
  .sitebrand { display:flex; align-items:center; gap:8px; font-weight:800; color:var(--ink); font-size:15px; }
  .wrap { max-width:720px; margin:0 auto; padding:24px 18px 90px; }

  .phead { text-align:center; margin-bottom:18px; }
  .phead h1 { font-size:26px; margin:0 0 6px; }
  .phead p { font-size:14.5px; color:var(--ink-soft); margin:0 0 14px; }
  .poverall { display:inline-flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:8px 16px; box-shadow:0 4px 12px var(--shadow); font-size:13.5px; font-weight:700; }
  .poverall .pbar { width:140px; height:9px; background:var(--purple-bg); border-radius:999px; overflow:hidden; }
  .poverall .pbar i { display:block; height:100%; background:linear-gradient(90deg,var(--purple),var(--purple-dark)); border-radius:999px; }
  .poverall b { color:var(--purple-dark); }

  .pt-head { display:flex; align-items:center; gap:10px; justify-content:center; margin:26px 0 6px; }
  .pt-name { font-size:16px; font-weight:800; padding:4px 14px; border-radius:999px; background:var(--purple-bg); color:var(--purple-dark); }
  .pt-prog { font-size:12.5px; color:var(--ink-soft); font-weight:700; }

  .ptrack { position:relative; padding:10px 0; }
  .ptrack::before { content:''; position:absolute; left:50%; top:18px; bottom:18px; width:3px; background:var(--line); transform:translateX(-50%); border-radius:2px; }
  .pnode { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:max-content; margin:0 auto; }
  .pnode + .pnode { margin-top:14px; }
  .pcircle { width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; text-decoration:none; border:3px solid var(--line); background:var(--card); color:var(--ink-soft); box-shadow:0 4px 10px var(--shadow); transition:transform .15s ease; }
  .pcircle:hover { transform:scale(1.07); }
  .pnode.done .pcircle { background:linear-gradient(135deg,#16A34A,#22C55E); border-color:#16A34A; color:#fff; }
  .pnode.current .pcircle { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); border-color:var(--purple); color:#fff; animation:pPulse 1.5s ease-in-out infinite; }
  .plabel { font-size:12px; color:var(--ink-soft); margin-top:5px; max-width:150px; text-align:center; line-height:1.3; }
  .pnode.current .plabel { color:var(--purple-dark); font-weight:800; }
  .pnow { font-size:11px; font-weight:800; color:#fff; background:var(--purple); border-radius:999px; padding:2px 10px; margin-top:5px; }
  @keyframes pPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(136,67,255,.5); } 50%{ box-shadow:0 0 0 9px rgba(136,67,255,0); } }
  @media (prefers-reduced-motion: reduce){ .pnode.current .pcircle{ animation:none; } }
  footer { text-align:center; color:var(--ink-soft); font-size:12.5px; padding:24px 18px 40px; }
</style>
</head>
<body>
<nav>
  <a class="sitebrand" href="index.html"><img class="brandlogo" src="assets/elicetrack.png" alt="Elice Track"><span class="brandsub">Coding Test</span></a>
  <a href="guide.html">준비 가이드</a>
  <a href="concepts.html">개념 정리</a>
  <a href="practice.html">예시 문제</a>
  <a class="on" href="path.html">학습 경로</a>
  <a href="gichul.html">기출 문제</a>
  <a class="mypage-link" style="margin-left:auto" href="progress.html">마이페이지</a>
</nav>

<div class="wrap">
  <header class="phead">
    <h1>학습 경로</h1>
    <p>입문부터 심화까지, 한 문제씩 정복하며 길을 따라가요.</p>
    <div class="poverall" id="poverall"></div>
  </header>
  <div id="pathRoot"></div>
</div>

<footer>Elice Track 코딩 테스트 준비자료 | 엘리스 트랙 수강생용</footer>

<script src="assets/problems.js"></script>
<script defer src="assets/config.js"></script>
<script defer src="assets/tracker.js"></script>
<script defer src="assets/app.js"></script>
<script defer src="assets/gamify.js"></script>
<script>
(function () {
  function readObj(k) { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch (e) { return {}; } }
  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }
  var ALL = window.CT_PROBLEMS || [];
  var solved = readObj('ct_practice_solved_v1');
  var TIERS = ['입문', '기초', '중급', '심화'];
  var examples = ALL.filter(function (p) { return !p.g; });
  var gichul = ALL.filter(function (p) { return p.g; });

  // 현재 추천: 전체 순서(입문->심화)에서 첫 미해결 한 곳
  var ordered = [];
  TIERS.forEach(function (t) { examples.forEach(function (p) { if (p.lv === t) ordered.push(p); }); });
  var currentId = null;
  for (var i = 0; i < ordered.length; i++) { if (!solved[ordered[i].id]) { currentId = ordered[i].id; break; } }

  var gi = 0; // 굽이(winding) 인덱스
  function nodeHtml(p, seq) {
    var off = Math.round(Math.sin(gi * 0.8) * 70); gi++;
    var done = !!solved[p.id];
    var cur = p.id === currentId;
    var cls = done ? 'done' : (cur ? 'current' : 'todo');
    var inner = done ? '✓' : seq;
    var now = cur ? '<span class="pnow">지금 도전</span>' : '';
    return '<div class="pnode ' + cls + '" style="transform:translateX(' + off + 'px)">' +
      '<a class="pcircle" href="run/?problem=' + encodeURIComponent(p.id) + '" title="' + esc(p.t) + '">' + inner + '</a>' +
      '<span class="plabel">' + esc(p.t) + '</span>' + now + '</div>';
  }

  var html = '';
  var seq = 0;
  TIERS.forEach(function (t) {
    var ps = examples.filter(function (p) { return p.lv === t; });
    if (!ps.length) return;
    var done = ps.filter(function (p) { return solved[p.id]; }).length;
    html += '<div class="pt-head"><span class="pt-name">' + t + '</span><span class="pt-prog">' + done + ' / ' + ps.length + '</span></div>';
    html += '<div class="ptrack">' + ps.map(function (p) { seq++; return nodeHtml(p, seq); }).join('') + '</div>';
  });
  if (gichul.length) {
    var gdone = gichul.filter(function (p) { return solved[p.id]; }).length;
    html += '<div class="pt-head"><span class="pt-name">기출 변형</span><span class="pt-prog">' + gdone + ' / ' + gichul.length + '</span></div>';
    html += '<div class="ptrack">' + gichul.map(function (p) { seq++; return nodeHtml(p, seq); }).join('') + '</div>';
  }
  document.getElementById('pathRoot').innerHTML = html;

  // 전체 진행(예시 문제 기준)
  var totalDone = examples.filter(function (p) { return solved[p.id]; }).length;
  var pct = examples.length ? Math.round(totalDone * 100 / examples.length) : 0;
  document.getElementById('poverall').innerHTML = '<span>전체 진행</span><span class="pbar"><i style="width:' + pct + '%"></i></span><b>' + totalDone + ' / ' + examples.length + '</b>';
})();
</script>
</body>
</html>
