<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Path - Elice Coding Camp</title>
<meta name="description" content="학습 경로: 단계별로 문제를 하나씩 정복하는 스킬트리.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#8843FF">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="assets/app.css">
<script>(function(){try{var t=localStorage.getItem('ctprep_theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Pretendard,-apple-system,'Malgun Gothic',sans-serif; }
  nav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:18px; padding:12px 22px; background:var(--nav-bg); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  nav a { color:var(--ink-soft); text-decoration:none; font-size:14px; font-weight:600; }
  nav a:hover { color:var(--purple-dark); }
  nav a.on { color:var(--purple-dark); }
  .sitebrand { display:flex; align-items:center; gap:8px; font-weight:800; color:var(--ink); font-size:15px; }
  .wrap { max-width:820px; margin:0 auto; padding:24px 18px 90px; }

  .phead { text-align:center; margin-bottom:10px; }
  .phead h1 { font-size:26px; margin:0 0 6px; }
  .phead p { font-size:14.5px; color:var(--ink-soft); margin:0 0 14px; }
  .poverall { display:inline-flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:8px 16px; box-shadow:0 4px 12px var(--shadow); font-size:13.5px; font-weight:700; }
  .poverall .pbar { width:160px; height:9px; background:var(--purple-bg); border-radius:999px; overflow:hidden; }
  .poverall .pbar i { display:block; height:100%; background:linear-gradient(90deg,var(--purple),var(--purple-dark)); border-radius:999px; }
  .poverall b { color:var(--purple-dark); }

  .pt-head { display:flex; align-items:center; gap:10px; justify-content:center; margin:30px 0 8px; }
  .pt-name { font-size:16px; font-weight:800; padding:5px 16px; border-radius:999px; background:var(--purple-bg); color:var(--purple-dark); }
  .pt-prog { font-size:12.5px; color:var(--ink-soft); font-weight:700; }

  /* 큼지막한 로드맵(단일 컬럼) */
  .ptrack { position:relative; padding:10px 0; }
  .ptrack::before { content:''; position:absolute; left:50%; top:20px; bottom:20px; width:4px; background:var(--line); transform:translateX(-50%); border-radius:2px; }
  .pnode { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:max-content; margin:0 auto; }
  .pnode + .pnode { margin-top:18px; }
  .pcircle { width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px; text-decoration:none; border:3px solid var(--line); background:var(--card); color:var(--ink-soft); box-shadow:0 5px 12px var(--shadow); transition:transform .15s ease; cursor:pointer; }
  .pcircle:hover { transform:scale(1.09); }
  .pnode.done .pcircle { background:linear-gradient(135deg,#16A34A,#22C55E); border-color:#16A34A; color:#fff; }
  .pnode.current .pcircle { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); border-color:var(--purple); color:#fff; width:74px; height:74px; font-size:22px; animation:pPulse 1.5s ease-in-out infinite; }
  .plabel { font-size:13px; color:var(--ink-soft); margin-top:7px; max-width:170px; text-align:center; line-height:1.35; }
  .pnode.current .plabel { color:var(--purple-dark); font-weight:800; font-size:14px; }
  .pnow { font-size:11.5px; font-weight:800; color:#fff; background:var(--purple); border-radius:999px; padding:3px 12px; margin-top:6px; box-shadow:0 3px 8px rgba(136,67,255,.35); }
  @keyframes pPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(136,67,255,.5); } 50%{ box-shadow:0 0 0 12px rgba(136,67,255,0); } }
  @media (prefers-reduced-motion: reduce){ .pnode.current .pcircle{ animation:none; } }

  /* 개념 레슨 노드: 문제(회색 원)와 구분되게 보라 톤 + 📖 */
  .pnode.lesson .pcircle { font-size:26px; }
  .pnode.lesson.current .pcircle { font-size:30px; }
  .pnode.lesson.todo .pcircle { background:var(--purple-bg); border-color:var(--purple); color:var(--purple-dark); }
  .pnode.lesson .plabel { color:var(--purple-dark); font-weight:700; }
  .pquiz { font-size:11px; font-weight:800; color:var(--purple-dark); background:var(--purple-bg); border:1px solid var(--line); border-radius:999px; padding:2px 10px; margin-top:5px; }
  .pnode.lesson.done .pquiz { color:var(--green,#16A34A); }

  /* 범례 */
  .plegend { display:inline-flex; flex-wrap:wrap; justify-content:center; gap:7px 14px; margin-top:12px; font-size:12.5px; color:var(--ink-soft); }
  .plegend span { display:inline-flex; align-items:center; gap:5px; }
  .plegend .dot { width:15px; height:15px; border-radius:50%; display:inline-block; }
  .plegend .d-lesson { background:var(--purple-bg); border:2px solid var(--purple); }
  .plegend .d-done { background:linear-gradient(135deg,#16A34A,#22C55E); }
  .plegend .d-cur { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); }

  footer { text-align:center; color:var(--ink-soft); font-size:12.5px; padding:24px 18px 40px; }

  /* 문제 풀이 모달(창) */
  .qz-ov { position:fixed; inset:0; background:rgba(20,16,40,.6); display:none; align-items:center; justify-content:center; z-index:500; padding:18px; }
  .qz-ov.on { display:flex; animation:qzFade .18s ease; }
  @keyframes qzFade { from{opacity:0} to{opacity:1} }
  .qz { background:var(--card); border:1px solid var(--line); border-radius:20px; width:min(96vw,1100px); max-width:none; max-height:92vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.4); padding:32px 40px 36px; animation:qzPop .26s cubic-bezier(.2,.7,.3,1); }
  @keyframes qzPop { from{ opacity:0; transform:translateY(28px) scale(.97); } to{ opacity:1; transform:none; } }
  .qz-q .qq .qtag { display:inline-block; font-size:11.5px; font-weight:800; color:var(--purple-dark); background:var(--purple-bg); border-radius:999px; padding:2px 10px; margin-right:8px; vertical-align:middle; }
  /* O/X 큰 버튼 */
  .qz-opts.ox { flex-direction:row; gap:14px; }
  .qz-opts.ox button { flex:1; flex-direction:column; align-items:center; gap:4px; padding:26px 16px; }
  .qz-opts.ox button b { font-size:38px; color:var(--purple-dark); line-height:1; }
  .qz-opts.ox button span { font-size:14px; font-weight:700; color:var(--ink-soft); }
  .qz-opts.ox button.correct b { color:#16A34A; }
  .qz-opts.ox button.wrong b { color:#E0526A; }
  /* 복수 정답 */
  .qz-multi { display:flex; flex-direction:column; gap:10px; }
  .qz-multi .mopt { display:flex; align-items:center; gap:11px; text-align:left; font-family:inherit; font-size:15.5px; padding:14px 16px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:12px; cursor:pointer; transition:border-color .12s,background .12s; }
  .qz-multi .mopt::before { content:''; width:20px; height:20px; border-radius:6px; border:2px solid var(--line); flex-shrink:0; }
  .qz-multi .mopt:hover:not(:disabled) { border-color:var(--purple); }
  .qz-multi .mopt.sel { border-color:var(--purple); background:var(--purple-bg); }
  .qz-multi .mopt.sel::before { background:var(--purple); border-color:var(--purple); }
  .qz-multi .mopt.correct { border-color:#16A34A; background:var(--green-bg,#E7F8EE); }
  .qz-multi .mopt.wrong { border-color:#E0526A; background:var(--red-bg,#FBECEE); }
  /* 순서 맞추기 */
  .qz-order { display:flex; flex-direction:column; gap:8px; }
  .qz-order.shake { animation:qzShake .4s; }
  @keyframes qzShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .oitem { display:flex; align-items:center; gap:12px; padding:12px 14px; border:1.5px solid var(--line); background:var(--card); border-radius:12px; }
  .qz-order.done .oitem { border-color:#16A34A; background:var(--green-bg,#E7F8EE); }
  .oitem .onum { width:24px; height:24px; flex-shrink:0; border-radius:50%; background:var(--purple-bg); color:var(--purple-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; }
  .oitem .otx { flex:1; font-size:15px; }
  .oitem .obtns { display:flex; gap:5px; flex-shrink:0; }
  .oitem .obtns button { width:32px; height:32px; border:1px solid var(--line); background:var(--card); border-radius:8px; cursor:pointer; font-size:14px; color:var(--ink); }
  .oitem .obtns button:disabled { opacity:.3; cursor:default; }
  .qz-actions { margin-top:16px; }
  .qz-actions .chk { font-family:inherit; font-weight:800; font-size:14px; padding:12px 24px; border:none; border-radius:11px; background:var(--purple); color:#fff; cursor:pointer; }
  .qz-actions .chk:disabled { opacity:.5; cursor:default; }
  .qz-fb { margin-top:10px; font-size:13px; font-weight:700; color:#E0526A; }
  .chip-ghost { box-shadow:0 6px 18px var(--shadow); }
  /* 단계 주차 라벨 + 노드 등장 */
  .pt-week { font-size:12px; font-weight:800; color:#fff; background:var(--purple); border-radius:999px; padding:3px 11px; }
  .pnode.pop { animation:nodeFade .5s both; }
  @keyframes nodeFade { from{ opacity:0; } to{ opacity:1; } }
  @media (prefers-reduced-motion: reduce){ .qz { animation:none; } .pnode.pop { animation:none; } .qz-order.shake { animation:none; } }
  .lp-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .lp-head h2 { font-size:23px; margin:0; }
  .lp-sub { font-size:13px; color:var(--ink-soft); margin:5px 0 18px; }
  .lp-sub a { color:var(--purple-dark); font-weight:700; text-decoration:none; }
  .lp-sub a:hover { text-decoration:underline; }
  .lp-close { background:none; border:none; font-size:26px; line-height:1; cursor:pointer; color:var(--ink-soft); }
  .lp-close:hover { color:var(--purple-dark); }
  .lp-prog { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
  .lp-prog .bar { flex:1; height:9px; background:var(--purple-bg); border-radius:999px; overflow:hidden; }
  .lp-prog .bar i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--purple),var(--purple-dark)); border-radius:999px; transition:width .4s ease; }
  .lp-prog .n { font-size:13px; font-weight:800; color:var(--purple-dark); white-space:nowrap; }
  .qz-q .qq { font-weight:700; font-size:18px; margin-bottom:18px; line-height:1.6; }
  .qz-q .qq .qn { color:var(--purple-dark); margin-right:8px; }
  .qz-q .qq .blank { color:var(--purple-dark); font-weight:800; }
  .qz-q .qq .blank.slot { display:inline-block; min-width:70px; text-align:center; border-bottom:2px dashed var(--purple); padding:1px 14px; vertical-align:bottom; }
  .qz-q .qq .blank.slot.filled { border-bottom-style:solid; }
  .qz-q .qq .blank.slot.correct { color:#16A34A; border-color:#16A34A; }
  .qz-q .qq .blank.slot.wrong { color:#E0526A; border-color:#E0526A; }
  .qz-q .qq .blank.slot.drop { background:var(--purple-bg); border-radius:6px 6px 0 0; }
  .qz-opts { display:flex; flex-direction:column; gap:10px; }
  .qz-opts button { text-align:left; font-family:inherit; font-size:15.5px; padding:15px 17px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:12px; cursor:pointer; transition:border-color .12s, background .12s; }
  .qz-opts button:hover:not(:disabled) { border-color:var(--purple); background:var(--purple-bg); }
  .qz-opts button:disabled { cursor:default; }
  .qz-opts button.correct { border-color:#16A34A; background:var(--green-bg,#E7F8EE); font-weight:700; }
  .qz-opts button.wrong { border-color:#E0526A; background:var(--red-bg,#FBECEE); }
  /* 빈칸 채우기: 보기 칩을 빈칸에 넣기(탭 또는 드래그) */
  .qz-fill-hint { font-size:12.5px; color:var(--ink-soft); margin-bottom:14px; }
  .qz-chips { display:flex; flex-wrap:wrap; gap:10px; }
  .qz-chips .chip { font-family:inherit; font-size:15.5px; font-weight:800; padding:12px 20px; border:1.5px solid var(--purple); background:var(--purple-bg); color:var(--purple-dark); border-radius:999px; cursor:grab; transition:background .12s,color .12s,opacity .12s; }
  .qz-chips .chip:hover:not(:disabled) { background:var(--purple); color:#fff; }
  .qz-chips .chip:active:not(:disabled) { cursor:grabbing; }
  .qz-chips .chip:disabled { cursor:default; }
  .qz-chips .chip.used { opacity:.35; }
  .qz-ex { font-size:13.5px; color:var(--ink-soft); line-height:1.6; margin-top:16px; padding:13px 15px; background:var(--purple-bg); border-radius:10px; display:none; }
  .qz-ex.show { display:block; }
  .qz-ex b { color:var(--purple-dark); }
  .lp-nav { display:flex; justify-content:space-between; gap:10px; margin-top:24px; }
  .lp-nav button { font-family:inherit; font-weight:700; font-size:14px; padding:11px 20px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  .lp-nav button:disabled { opacity:.4; cursor:default; }
  .lp-nav .next { background:var(--purple); color:#fff; border-color:var(--purple); }
  .qz-done { margin-top:20px; padding:20px; text-align:center; background:var(--purple-bg); border-radius:14px; }
  .qz-done .big { font-size:20px; font-weight:800; color:var(--purple-dark); }
  .qz-done .sm { font-size:13.5px; color:var(--ink-soft); margin-top:5px; }
  .qz-done .nextlesson { display:inline-block; margin-top:14px; font-weight:800; font-size:14px; padding:11px 20px; border-radius:10px; background:var(--purple); color:#fff; border:none; font-family:inherit; cursor:pointer; }
  @media (prefers-reduced-motion: reduce){ .lp-prog .bar i { transition:none; } .qz-ov.on { animation:none; } }
</style>
</head>

<div class="wrap">

    <p>길을 따라가며 개념(📖)을 누르면 문제 풀이 창이 열려요. 다 맞히면 다음으로 나아가요.</p>
