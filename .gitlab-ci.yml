# GitLab Pages 배포 (Windows shell executor 용)
# 이 사이트는 레포 루트의 정적 파일(HTML/CSS/JS + Blazor WASM 런박스)이라
# 별도 빌드 없이 전체를 public/ 으로 복사만 하면 됩니다.
# Docker 없이 호스트 PowerShell 에서 실행되므로 PowerShell 복사 명령을 사용해요.
# (shell executor 는 image: 키워드를 무시하므로 이미지 지정은 두지 않았어요.)
pages:
  stage: deploy
  script:
    - if (Test-Path public) { Remove-Item public -Recurse -Force }
    - New-Item -ItemType Directory -Path public | Out-Null
    - Get-ChildItem -Path . -Force | Where-Object { $_.Name -notin @('.git','public','.gitlab-ci.yml') } | Copy-Item -Destination public -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    # 기본 브랜치(main)에 push 될 때만 배포
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
